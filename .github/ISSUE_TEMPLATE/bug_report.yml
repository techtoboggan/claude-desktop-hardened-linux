name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please include as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: "Paste the output of: `claude-desktop-hardened --doctor`"
      render: text
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Distro and version
      placeholder: "e.g., Fedora 43, Ubuntu 24.04, Arch (rolling)"
    validations:
      required: true

  - type: dropdown
    id: display-server
    attributes:
      label: Display server
      options:
        - Wayland (GNOME)
        - Wayland (KDE Plasma)
        - Wayland (Sway)
        - Wayland (Hyprland)
        - Wayland (other)
        - X11
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - COPR (dnf)
        - AUR (yay/paru)
        - APT repo
        - Quick install script
        - Manual (.rpm/.deb/.pkg.tar.zst)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Any error output, journal logs (`journalctl --user -u claude-desktop-hardened`), or debug output (`COWORK_DEBUG=1 claude-desktop-hardened`)."
      render: text
